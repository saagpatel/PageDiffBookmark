<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page DiffBookmark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      min-height: 200px;
      max-height: 520px;
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
      overflow-y: auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border: 1px solid #d4d4d4;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover { background: #f0f0f0; border-color: #bbb; }
    .btn:active { background: #e5e5e5; }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    .btn-primary:hover { background: #333; }

    .btn-danger {
      color: #dc2626;
      border-color: #fca5a5;
    }

    .btn-danger:hover { background: #fef2f2; border-color: #dc2626; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .empty-state .icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    .empty-state p {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
      max-width: 240px;
    }

    .bookmark-list {
      list-style: none;
    }

    .bookmark-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }

    .bookmark-item:hover { background: #f5f5f5; }

    .bookmark-favicon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      margin-top: 1px;
      flex-shrink: 0;
      background: #e5e5e5;
      object-fit: contain;
    }

    .bookmark-info {
      flex: 1;
      min-width: 0;
    }

    .bookmark-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-url {
      font-size: 11px;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .bookmark-meta {
      font-size: 11px;
      color: #aaa;
      margin-top: 3px;
    }

    .bookmark-actions {
      flex-shrink: 0;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .btn-icon {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      color: #999;
      transition: all 0.15s;
    }

    .btn-icon:hover { background: #f0f0f0; color: #666; border-color: #e0e0e0; }
    .btn-icon.delete:hover { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }

    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1a1a1a;
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
      pointer-events: none;
      z-index: 100;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>DiffBookmark</h1>
    <div class="header-actions">
      <button class="btn btn-primary" id="track-btn">+ Track Page</button>
    </div>
  </div>

  <div class="empty-state" id="empty-state">
    <div class="icon">&#916;</div>
    <h2>No pages tracked yet</h2>
    <p>Right-click any page and select "Track this page", or click the button above.</p>
  </div>

  <ul class="bookmark-list" id="bookmark-list"></ul>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
