<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page DiffBookmark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 400px;
      min-height: 200px;
      max-height: 560px;
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
      overflow-y: auto;
    }

    /* ── Header ─────────────────────────────────── */

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    /* ── Buttons ─────────────────────────────────── */

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border: 1px solid #d4d4d4;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover { background: #f0f0f0; border-color: #bbb; }
    .btn:active { background: #e5e5e5; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn:disabled:hover { background: #fff; border-color: #d4d4d4; }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    .btn-primary:hover { background: #333; }
    .btn-primary:disabled:hover { background: #1a1a1a; }

    .btn-sm {
      padding: 3px 7px;
      font-size: 11px;
      border-radius: 5px;
    }

    .btn-diff {
      color: #15803d;
      border-color: #86efac;
      font-weight: 600;
    }

    .btn-diff:hover { background: #f0fdf4; border-color: #15803d; }

    .btn-icon {
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: #999;
      transition: all 0.15s;
      padding: 0;
    }

    .btn-icon:hover { background: #f0f0f0; color: #666; border-color: #e0e0e0; }
    .btn-icon.delete:hover { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }
    .btn-icon.settings:hover { background: #f0f0f0; color: #333; }

    /* ── Empty state ────────────────────────────── */

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .empty-state .icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    .empty-state p {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
      max-width: 240px;
    }

    /* ── Bookmark list ──────────────────────────── */

    .bookmark-list { list-style: none; }

    .bookmark-item {
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }

    .bookmark-item:hover { background: #f8f8f8; }
    .bookmark-item.unread { border-left-color: #E53E3E; }
    .bookmark-item.paused { opacity: 0.55; }

    .bookmark-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .bookmark-favicon {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      margin-top: 2px;
      flex-shrink: 0;
      background: #e5e5e5;
      object-fit: contain;
    }

    .bookmark-info {
      flex: 1;
      min-width: 0;
    }

    .bookmark-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-url {
      font-size: 11px;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .bookmark-meta {
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
    }

    .bookmark-controls {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 7px;
      padding-left: 28px;
    }

    .interval-select {
      font-size: 11px;
      padding: 2px 4px;
      border: 1px solid #d4d4d4;
      border-radius: 4px;
      background: #fff;
      color: #555;
      cursor: pointer;
    }

    .interval-select:hover { border-color: #bbb; }

    /* ── Settings panel ─────────────────────────── */

    .settings-panel { display: none; }

    .settings-panel.visible { display: block; }

    .settings-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
    }

    .settings-header h2 {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .settings-body {
      padding: 12px 16px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .setting-row:last-child { border-bottom: none; }

    .setting-label {
      font-size: 13px;
      font-weight: 500;
    }

    .setting-desc {
      font-size: 11px;
      color: #999;
      margin-top: 1px;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      border: none;
      border-radius: 10px;
      background: #d4d4d4;
      cursor: pointer;
      transition: background 0.2s;
      padding: 0;
    }

    .toggle.on { background: #1a1a1a; }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
    }

    .toggle.on::after { transform: translateX(16px); }

    /* ── Toast ──────────────────────────────────── */

    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1a1a1a;
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
      pointer-events: none;
      z-index: 100;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- Main view -->
  <div id="main-view">
    <div class="header">
      <h1>DiffBookmark</h1>
      <div class="header-actions">
        <button class="btn-icon settings" id="settings-btn" title="Settings">&#9881;</button>
        <button class="btn btn-primary" id="track-btn">+ Track</button>
      </div>
    </div>

    <div class="empty-state" id="empty-state">
      <div class="icon">&#916;</div>
      <h2>No pages tracked yet</h2>
      <p>Right-click any page and select "Track this page", or click the button above.</p>
    </div>

    <ul class="bookmark-list" id="bookmark-list"></ul>
  </div>

  <!-- Settings view -->
  <div class="settings-panel" id="settings-panel">
    <div class="settings-header">
      <button class="btn-icon" id="settings-back" title="Back">&#8592;</button>
      <h2>Settings</h2>
    </div>
    <div class="settings-body">
      <div class="setting-row">
        <div>
          <div class="setting-label">Default poll interval</div>
          <div class="setting-desc">For new bookmarks</div>
        </div>
        <select class="interval-select" id="setting-interval">
          <option value="1">1h</option>
          <option value="3">3h</option>
          <option value="6" selected>6h</option>
          <option value="12">12h</option>
          <option value="24">24h</option>
        </select>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Notifications</div>
          <div class="setting-desc">OS alerts on change</div>
        </div>
        <button class="toggle on" id="setting-notifications"></button>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Badge count</div>
          <div class="setting-desc">Unread count on icon</div>
        </div>
        <button class="toggle on" id="setting-badge"></button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
